name: Build installers

# 실행 방법:
#  - GitHub 저장소의 "Actions" 탭 → 이 워크플로 선택 → "Run workflow" 버튼
#  - 또는 v1.0.0 같은 태그를 push 하면 자동 실행
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      # 잡을 하나씩 순차 실행 — 두 OS가 동시에 같은 릴리스를 만들다 충돌(422 already_exists)하는 것을 방지.
      max-parallel: 1
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build app (renderer)
        run: npm run build

      - name: Build & publish installer
        run: npx electron-builder --publish always
        env:
          # 릴리스 생성·업로드용 토큰 (electron-updater가 이 릴리스에서 새 버전을 찾음)
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 코드 서명 인증서가 없으므로 맥 서명은 건너뜀 (서명 없는 dmg 생성)
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload installer
        uses: actions/upload-artifact@v7
        with:
          name: Habit-Game-${{ runner.os }}
          if-no-files-found: ignore
          path: |
            release/*.dmg
            release/*.exe
